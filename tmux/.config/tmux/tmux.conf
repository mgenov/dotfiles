# ── Prefix ──────────────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── Sane defaults ───────────────────────────────────────────────────────────
set -g base-index 1
set -g pane-base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 100000
set -g mouse on
set -s escape-time 10
set -g focus-events on
set -g detach-on-destroy off
set -g set-clipboard on
setw -g aggressive-resize on

# ── True color ──────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB,kitty:RGB"

# ── Extended keys (reliable C-Space prefix in kitty) ────────────────────────
set -s extended-keys on
set -as terminal-features 'xterm-kitty:extkeys'

# ── Splits & windows ────────────────────────────────────────────────────────
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Resize panes — repeatable
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Reload / edit config ────────────────────────────────────────────────────
bind R source-file ~/.config/tmux/tmux.conf \; display "reloaded"
bind e new-window -n "tmux.conf" "$EDITOR ~/.config/tmux/tmux.conf"

# ── Copy mode (vi) ──────────────────────────────────────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel "pbcopy"
bind ] run "pbpaste | tmux load-buffer - && tmux paste-buffer"

# ── vim-tmux-navigator (seamless nvim ↔ tmux pane nav) ──────────────────────
# Detect if the active pane is running vim/nvim and forward the keystroke.
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n C-h if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n C-j if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n C-k if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n C-l if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'
bind-key -T copy-mode-vi C-h select-pane -L
bind-key -T copy-mode-vi C-j select-pane -D
bind-key -T copy-mode-vi C-k select-pane -U
bind-key -T copy-mode-vi C-l select-pane -R

# ── Project switcher (Primeagen-style) ──────────────────────────────────────
bind -r f run-shell "tmux neww tmux-sessionizer"

# Quick session jump via fzf popup
bind s display-popup -E -w 60% -h 50% \
    "tmux list-sessions -F '#S' | grep -v \"^$(tmux display-message -p '#S')\$\" | fzf --reverse --prompt='session> ' | xargs -r tmux switch-client -t"

# ── Status bar ──────────────────────────────────────────────────────────────
set -g status-position top
set -g status-style "bg=default,fg=default"
set -g status-interval 5
set -g status-left  "#[bold,fg=#bd93f9] #S #[fg=default]│ "
set -g status-right "#[fg=#6272a4]%H:%M #[fg=default]│ #[fg=#8be9fd]%a %d %b "
set -g status-left-length 40
set -g status-right-length 40
set -g window-status-format         " #I:#W "
set -g window-status-current-format "#[bold,fg=#282a36,bg=#bd93f9] #I:#W "
set -g window-status-separator      ""

# Pane border
set -g pane-border-style "fg=#44475a"
set -g pane-active-border-style "fg=#bd93f9"
