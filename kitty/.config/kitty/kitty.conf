# Font
font_family      JetBrains Mono
bold_font        JetBrains Mono Bold
italic_font      JetBrains Mono Italic
bold_italic_font JetBrains Mono Bold Italic
font_size        13.0

# Window
hide_window_decorations titlebar-only
startup_session          none
remember_window_size     no
initial_window_width     2000
initial_window_height    1200

# Background transparency (shows desktop wallpaper through)
# background_opacity       0.85

# macOS: Option as Alt
macos_option_as_alt both

# Hide mouse when typing
mouse_hide_wait 0

# Enable mouse link click
mouse_map left click ungrabbed mouse_handle_click prompt
mouse_map ctrl+left click ungrabbed mouse_handle_click link

# Scrollback
scrollback_lines 100000

# Keyboard shortcuts
# Disable kitty tabs/windows — managed by tmux/zellij
map cmd+left no_op
map cmd+right no_op

# Send CSI-u for Shift+Enter so apps (e.g. Claude Code) get a distinct key
map shift+enter send_text all \x1b[13;2u

# Remote control: required by ~/bin/tm-switch (Karabiner hyper+t).
allow_remote_control yes
listen_on unix:/tmp/kitty-%U

# Tokyo Night Moon theme colors
foreground            #c8d3f5
background            #222436
selection_foreground  #c8d3f5
selection_background  #2d3f76

# Cursor
cursor                #c8d3f5
cursor_text_color     #222436

# URL
url_color             #4fd6be

# Black
color0  #1b1d2b
color8  #444a73

# Red
color1  #ff757f
color9  #ff757f

# Green
color2  #c3e88d
color10 #c3e88d

# Yellow
color3  #ffc777
color11 #ffc777

# Blue
color4  #82aaff
color12 #82aaff

# Magenta
color5  #c099ff
color13 #c099ff

# Cyan
color6  #86e1fc
color14 #86e1fc

# White
color7  #828bb8
color15 #c8d3f5

# Tab bar
tab_bar_edge             top
tab_bar_style            powerline
tab_powerline_style      slanted
active_tab_foreground    #c8d3f5
active_tab_background    #2f334d
active_tab_font_style    bold
inactive_tab_foreground  #545c7e
inactive_tab_background  #1e2030
inactive_tab_font_style  normal
tab_bar_background       #1b1d2b
