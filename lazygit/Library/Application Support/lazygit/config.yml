gui:
  promptToReturnFromSubprocess: false
  theme:
    selectedLineBgColor:
      - '#3d4f6b'
    selectedRangeBgColor:
      - '#3d4f6b'
git:
  pagers:
    - colorArg: always
      pager: delta --paging=never
os:
  edit: "echo {{filename}} > /tmp/lazygit-path; kill -9 $PPID"
  editAtLine: "echo {{filename}}:{{line}} > /tmp/lazygit-path; kill -9 $PPID"
